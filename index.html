<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    color: white;
    text-align: center;
}

/* ESTRELLAS */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
}

/* SOBRE */
.envelope {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 100px;
    cursor: pointer;
}

/* CARTA */
.letter {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #111;
    padding: 30px;
    border-radius: 20px;
    width: 300px;
    box-shadow: 0 0 20px pink;
}

.letter h1 {
    font-family: 'Pacifico', cursive;
    color: #ff69b4;
}

.button {
    margin-top: 20px;
    padding: 10px 20px;
    background: #ff69b4;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

/* JUEGO */
.game {
    display: none;
}

.heart {
    position: absolute;
    font-size: 25px;
    cursor: pointer;
}

#score {
    position: absolute;
    top: 10px;
    left: 10px;
}

.final {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 30px;
    color: #ff69b4;
    font-family: 'Pacifico';
}
</style>
</head>

<body>

<div id="stars"></div>

<div class="envelope" onclick="openLetter()">💌</div>

<div class="letter" id="letter">
    <h1>Para ti 💖</h1>
    <p>
        Desde que llegaste a mi vida todo cambió...  
        cada momento contigo es especial,  
        y no hay un solo día en el que no piense en ti.  

        Gracias por hacerme tan feliz.  
        Te amo muchísimo 💕
    </p>

    <button class="button" onclick="startGame()">Jugar 💖</button>
</div>

<div class="game" id="game">
    <div id="score">Puntos: 0</div>
</div>

<div class="final" id="final">
    Ganaste mi corazón para siempre 💖
</div>

<script>
// estrellas
for(let i=0;i<200;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.top=Math.random()*100+"vh";
    star.style.left=Math.random()*100+"vw";
    document.body.appendChild(star);
}

// abrir carta
function openLetter(){
    document.querySelector(".envelope").style.display="none";
    document.getElementById("letter").style.display="block";
}

// juego
let score=0;

function startGame(){
    document.getElementById("letter").style.display="none";
    document.getElementById("game").style.display="block";

    let interval=setInterval(()=>{
        createHeart();
    },500);

    setTimeout(()=>{
        clearInterval(interval);
        document.getElementById("game").style.display="none";
        document.getElementById("final").style.display="block";
    },15000);
}

function createHeart(){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";

    heart.style.left=Math.random()*100+"vw";
    heart.style.top="0px";

    document.body.appendChild(heart);

    let fall=setInterval(()=>{
        heart.style.top=(heart.offsetTop+5)+"px";
    },30);

    heart.onclick=()=>{
        score++;
        document.getElementById("score").innerText="Puntos: "+score;
        heart.remove();
        clearInterval(fall);
    };

    setTimeout(()=>{
        heart.remove();
        clearInterval(fall);
    },5000);
}
</script>

</body>
</html>
